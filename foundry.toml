[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
via_ir = true
optimizer = true 
optimizer_runs = 5000

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options


[dependencies]
openzeppelin-contracts = "5.0.2"

[fuzz]
runs = 10000

[invariant]
runs = 2000
depth = 120