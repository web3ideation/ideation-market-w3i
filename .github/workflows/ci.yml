name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      lane:
        description: "test lane (pr/nightly/release)"
        required: false
        default: "pr"
        type: choice
        options:
          - pr
          - nightly
          - release
      run_seed_matrix:
        description: "run Foundry seed matrix jobs"
        required: false
        default: false
        type: boolean

env:
  FOUNDRY_PROFILE: pr

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge build
        run: |
          forge build --sizes
        id: build

      - name: Run selector clash check
        run: |
          chmod +x script/check-selectors.sh
          script/check-selectors.sh
        id: selectorClash

      - name: Run Forge tests
        run: |
          forge test -vvv
        id: test

      - name: Run gas snapshot regression check
        run: |
          bash script/gas-snapshot-check.sh
        id: gas

  nightly-seeds:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_seed_matrix == true && inputs.lane == 'nightly') }}
    name: Foundry nightly seed matrix
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        seed: [1001, 1002, 1003, 1004, 1005, 1006, 1007, 1008, 1009, 1010]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Run nightly seed
        env:
          FOUNDRY_PROFILE: nightly
        run: |
          mkdir -p artifacts/foundry
          forge test --fuzz-seed ${{ matrix.seed }} -vv | tee artifacts/foundry/nightly-seed-${{ matrix.seed }}.log

      - name: Upload nightly seed artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundry-nightly-seed-${{ matrix.seed }}
          path: artifacts/foundry/nightly-seed-${{ matrix.seed }}.log
          if-no-files-found: warn
          retention-days: 30

  release-seeds:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_seed_matrix == true && inputs.lane == 'release' }}
    name: Foundry release seed matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        seed: [2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Run release seed
        env:
          FOUNDRY_PROFILE: release
        run: |
          mkdir -p artifacts/foundry
          forge test --fuzz-seed ${{ matrix.seed }} -vv | tee artifacts/foundry/release-seed-${{ matrix.seed }}.log

      - name: Upload release seed artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundry-release-seed-${{ matrix.seed }}
          path: artifacts/foundry/release-seed-${{ matrix.seed }}.log
          if-no-files-found: warn
          retention-days: 30

  nightly-echidna:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.lane == 'nightly') }}
    name: Echidna nightly lane
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pull Echidna container
        run: |
          docker pull ghcr.io/crytic/echidna/echidna

      - name: Run Echidna nightly
        run: |
          mkdir -p artifacts/echidna
          docker run --rm -v "$PWD":/src ghcr.io/crytic/echidna/echidna \
            bash -lc "cd /src && ECHIDNA_CONFIG=echidna.nightly.yaml bash script/run-echidna.sh --format text" \
            | tee artifacts/echidna/echidna-nightly.log

      - name: Upload Echidna nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: echidna-nightly-artifacts
          path: |
            artifacts/echidna/echidna-nightly.log
            security-tools/echidna/echidna_corpus/reproducers/
            security-tools/echidna/echidna_corpus/coverage/
          if-no-files-found: warn
          retention-days: 30

  release-echidna:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.lane == 'release' }}
    name: Echidna release lane
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pull Echidna container
        run: |
          docker pull ghcr.io/crytic/echidna/echidna

      - name: Run Echidna release
        run: |
          mkdir -p artifacts/echidna
          docker run --rm -v "$PWD":/src ghcr.io/crytic/echidna/echidna \
            bash -lc "cd /src && ECHIDNA_CONFIG=echidna.release.yaml bash script/run-echidna.sh --format text" \
            | tee artifacts/echidna/echidna-release.log

      - name: Upload Echidna release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: echidna-release-artifacts
          path: |
            artifacts/echidna/echidna-release.log
            security-tools/echidna/echidna_corpus/reproducers/
            security-tools/echidna/echidna_corpus/coverage/
          if-no-files-found: warn
          retention-days: 30
