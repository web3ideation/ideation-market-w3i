name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure submodules are initialized
        run: |
          git submodule update --init --recursive || true
          if [ ! -f lib/openzeppelin-contracts/contracts/token/ERC20/ERC20.sol ]; then
            rm -rf lib/openzeppelin-contracts
            git clone --depth 1 --branch v5.0.2 https://github.com/OpenZeppelin/openzeppelin-contracts lib/openzeppelin-contracts
          fi
          if [ ! -f lib/forge-std/src/Test.sol ]; then
            rm -rf lib/forge-std
            git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std
          fi
          test -f lib/openzeppelin-contracts/contracts/token/ERC20/ERC20.sol
          test -f lib/forge-std/src/Test.sol

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge fmt (required on PR)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge fmt (non-blocking on push)
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          forge fmt --check || true
        id: fmtPush

      - name: Run Forge build
        run: |
          forge build --sizes
        id: build

      - name: Run selector clash check
        run: |
          chmod +x script/check-selectors.sh
          script/check-selectors.sh
        id: selectorClash

      - name: Run Forge tests
        run: |
          forge test -vvv
        id: test

      - name: Run gas snapshot regression check
        run: |
          bash script/gas-snapshot-check.sh
        id: gas
